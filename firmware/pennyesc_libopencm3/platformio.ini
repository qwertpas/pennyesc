; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
; Shared settings for all environments
platform = ststm32
board = custom_l011
framework = libopencm3
upload_protocol = stlink
debug_tool = stlink
build_type = release
build_flags = 
    -Os                    ; Optimize for size (reduces ROM usage significantly)
    -g                      ; Keep debug symbols for MCUViewer
    -ggdb                   ; GDB debug info
    -ffunction-sections      ; Place each function in its own section (enables dead code elimination)
    -fdata-sections         ; Place each data item in its own section
    -Wl,--gc-sections       ; Remove unused sections during linking
    -Wl,--print-memory-usage ; Print memory usage after linking
    -I ../Lib

[env:pennyesc_uart]
build_src_filter = +<*> -<angleLUT.c> -<main_calibration.c> -<main_encoder.c> -<main_stepper.c> -<uart_boot.c>
build_flags =
    ${env.build_flags}
    -DPNY_UART_UPDATE=1
    -flto
    -fno-unwind-tables
    -fno-asynchronous-unwind-tables
board_build.ldscript = ld/uart_app_cal.ld
board_upload.maximum_size = 13696
extra_scripts = post:extra_uart_update.py
custom_bridge_port = /dev/cu.usbmodem101
custom_esc_address = 1

[env:stepper_swd]
build_src_filter = +<main_stepper.c> +<mct8316z.c> +<tmag5273.c>
build_flags =
    ${env.build_flags}
    -DPNY_ESC_ADDRESS=2
    -flto
    -fno-unwind-tables
    -fno-asynchronous-unwind-tables
board_build.ldscript = ld/standalone.ld
board_upload.maximum_size = 14336

[env:seed]
build_src_filter = +<uart_boot.c> -<main.c> -<main_calibration.c> -<main_encoder.c> -<mct8316z.c> -<pennyesc_boot.c> -<pennyesc_calibration.c> -<pennyesc_uart_update.c> -<tmag5273.c> -<angleLUT.c>
build_flags =
    ${env.build_flags}
    -flto
    -fno-unwind-tables
    -fno-asynchronous-unwind-tables
board_build.ldscript = ld/uart_boot.ld
board_upload.maximum_size = 1408
extra_scripts = post:extra_uart_update.py
targets = seed_upload
custom_app_env = pennyesc_uart
custom_boot_env = seed
custom_seed_probe_rounds = 0
custom_bridge_port = /dev/cu.usbmodem101
custom_esc_address = 1

[env:readdress]
build_src_filter = +<uart_boot.c> -<main.c> -<main_calibration.c> -<main_encoder.c> -<mct8316z.c> -<pennyesc_boot.c> -<pennyesc_calibration.c> -<pennyesc_uart_update.c> -<tmag5273.c> -<angleLUT.c>
build_flags =
    ${env.build_flags}
    -flto
    -fno-unwind-tables
    -fno-asynchronous-unwind-tables
board_build.ldscript = ld/uart_boot.ld
board_upload.maximum_size = 1408
extra_scripts = post:extra_uart_update.py
targets = uart_readdress
custom_app_env = pennyesc_uart
custom_bridge_port = /dev/cu.usbmodem101
custom_current_esc_address = 0
custom_new_esc_address = 1
